name: Build Mac App

on:
  push:
    branches:
      - main

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Build App
        run: |
          pyinstaller -w main.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-app
          path: dist/